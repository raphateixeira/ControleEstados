name: Publicar Controle Estados

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-deploy:
    permissions:
      contents: read
      pages: write
      id-token: write
    uses: raphateixeira/.github/.github/workflows/quarto-publish.yml@main
    with:
      needs_r: true
      r_packages: "knitr, rmarkdown, magick, pdftools"
      needs_magick_system_deps: true
      needs_tinytex: true
      tinytex_packages: "pgf pgfplots xcolor"
      output_dir: "docs"
